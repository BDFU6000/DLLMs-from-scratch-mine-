<svg viewBox="0 0 920 660" xmlns="http://www.w3.org/2000/svg" font-family="ui-sans-serif, system-ui, sans-serif">
  <rect width="920" height="660" fill="#f8fafc"/>
  <text x="460" y="32" text-anchor="middle" font-size="22" font-weight="800" fill="#0f172a">The Classic ML Algorithms — Geometric Intuition</text>

  <!-- Linear Regression -->
  <rect x="20" y="50" width="288" height="180" rx="12" fill="#fff" stroke="#e2e8f0"/>
  <text x="36" y="74" font-size="14" font-weight="700" fill="#2563eb">Linear Regression</text>
  <text x="36" y="92" font-size="10.5" fill="#64748b">predict a NUMBER · best-fit line</text>
  <line x1="40" y1="210" x2="295" y2="210" stroke="#cbd5e1"/><line x1="40" y1="210" x2="40" y2="110" stroke="#cbd5e1"/>
  <line x1="50" y1="200" x2="290" y2="120" stroke="#2563eb" stroke-width="2.5"/>
  <circle cx="70" cy="195" r="4" fill="#0f172a"/><circle cx="110" cy="185" r="4" fill="#0f172a"/><circle cx="150" cy="160" r="4" fill="#0f172a"/><circle cx="190" cy="155" r="4" fill="#0f172a"/><circle cx="230" cy="138" r="4" fill="#0f172a"/><circle cx="265" cy="130" r="4" fill="#0f172a"/>

  <!-- Logistic Regression -->
  <rect x="316" y="50" width="288" height="180" rx="12" fill="#fff" stroke="#e2e8f0"/>
  <text x="332" y="74" font-size="14" font-weight="700" fill="#16a34a">Logistic Regression</text>
  <text x="332" y="92" font-size="10.5" fill="#64748b">predict a CATEGORY · S-curve to a probability</text>
  <line x1="336" y1="210" x2="595" y2="210" stroke="#cbd5e1"/><line x1="336" y1="210" x2="336" y2="110" stroke="#cbd5e1"/>
  <line x1="336" y1="160" x2="595" y2="160" stroke="#dc2626" stroke-dasharray="4 3"/><text x="600" y="163" font-size="9" fill="#dc2626">0.5</text>
  <path d="M346 205 C 430 205, 450 115, 585 115" stroke="#16a34a" stroke-width="2.5" fill="none"/>
  <text x="360" y="200" font-size="9" fill="#64748b">class 0</text><text x="540" y="128" font-size="9" fill="#64748b">class 1</text>

  <!-- SVM -->
  <rect x="612" y="50" width="288" height="180" rx="12" fill="#fff" stroke="#e2e8f0"/>
  <text x="628" y="74" font-size="14" font-weight="700" fill="#9333ea">Support Vector Machine</text>
  <text x="628" y="92" font-size="10.5" fill="#64748b">widest gap between two classes</text>
  <line x1="650" y1="210" x2="860" y2="110" stroke="#0f172a" stroke-width="2.5"/>
  <line x1="635" y1="210" x2="845" y2="110" stroke="#94a3b8" stroke-dasharray="4 3"/>
  <line x1="665" y1="210" x2="875" y2="110" stroke="#94a3b8" stroke-dasharray="4 3"/>
  <circle cx="660" cy="135" r="5" fill="#dc2626"/><circle cx="690" cy="120" r="5" fill="#dc2626"/><circle cx="700" cy="150" r="5" fill="#dc2626"/>
  <rect x="800" y="180" width="11" height="11" fill="#2563eb"/><rect x="830" y="165" width="11" height="11" fill="#2563eb"/><rect x="790" y="200" width="11" height="11" fill="#2563eb"/>
  <text x="700" y="205" font-size="9" fill="#64748b">margin</text>

  <!-- Decision Tree -->
  <rect x="20" y="246" width="288" height="180" rx="12" fill="#fff" stroke="#e2e8f0"/>
  <text x="36" y="270" font-size="14" font-weight="700" fill="#ea580c">Decision Tree</text>
  <text x="36" y="288" font-size="10.5" fill="#64748b">a flowchart of yes/no questions</text>
  <rect x="130" y="300" width="70" height="26" rx="6" fill="#ea580c"/><text x="165" y="317" text-anchor="middle" font-size="9" fill="#fff">age &gt; 30?</text>
  <line x1="150" y1="326" x2="90" y2="356" stroke="#94a3b8"/><line x1="180" y1="326" x2="245" y2="356" stroke="#94a3b8"/>
  <text x="110" y="345" font-size="8" fill="#64748b">no</text><text x="210" y="345" font-size="8" fill="#64748b">yes</text>
  <rect x="55" y="358" width="70" height="24" rx="6" fill="#fde68a"/><text x="90" y="374" text-anchor="middle" font-size="9" fill="#92400e">income?</text>
  <rect x="210" y="358" width="70" height="24" rx="6" fill="#bbf7d0"/><text x="245" y="374" text-anchor="middle" font-size="9" fill="#166534">APPROVE</text>
  <line x1="78" y1="382" x2="60" y2="404" stroke="#94a3b8"/><line x1="102" y1="382" x2="120" y2="404" stroke="#94a3b8"/>
  <rect x="35" y="405" width="52" height="16" rx="4" fill="#fecaca"/><text x="61" y="417" text-anchor="middle" font-size="8" fill="#991b1b">DENY</text>
  <rect x="95" y="405" width="52" height="16" rx="4" fill="#bbf7d0"/><text x="121" y="417" text-anchor="middle" font-size="8" fill="#166534">APPROVE</text>

  <!-- Random Forest -->
  <rect x="316" y="246" width="288" height="180" rx="12" fill="#fff" stroke="#e2e8f0"/>
  <text x="332" y="270" font-size="14" font-weight="700" fill="#0d9488">Random Forest</text>
  <text x="332" y="288" font-size="10.5" fill="#64748b">many trees VOTE · fixes overfitting</text>
  <g stroke="#0d9488" stroke-width="2" fill="none">
    <path d="M360 360 V330 M360 345 L345 335 M360 345 L375 335"/>
    <path d="M430 360 V330 M430 345 L415 335 M430 345 L445 335"/>
    <path d="M500 360 V330 M500 345 L485 335 M500 345 L515 335"/>
  </g>
  <text x="360" y="378" text-anchor="middle" font-size="9" fill="#64748b">tree1: A</text>
  <text x="430" y="378" text-anchor="middle" font-size="9" fill="#64748b">tree2: A</text>
  <text x="500" y="378" text-anchor="middle" font-size="9" fill="#64748b">tree3: B</text>
  <rect x="378" y="392" width="120" height="24" rx="6" fill="#0d9488"/><text x="438" y="408" text-anchor="middle" font-size="10" font-weight="700" fill="#fff">majority vote → A</text>

  <!-- K-Means -->
  <rect x="612" y="246" width="288" height="180" rx="12" fill="#fff" stroke="#e2e8f0"/>
  <text x="628" y="270" font-size="14" font-weight="700" fill="#db2777">K-Means Clustering</text>
  <text x="628" y="288" font-size="10.5" fill="#64748b">unsupervised · groups around K centers</text>
  <circle cx="670" cy="330" r="5" fill="#fbcfe8"/><circle cx="690" cy="345" r="5" fill="#fbcfe8"/><circle cx="660" cy="350" r="5" fill="#fbcfe8"/>
  <text x="675" y="332" font-size="14" font-weight="800" fill="#db2777">×</text>
  <circle cx="800" cy="320" r="5" fill="#bfdbfe"/><circle cx="820" cy="335" r="5" fill="#bfdbfe"/><circle cx="810" cy="350" r="5" fill="#bfdbfe"/>
  <text x="808" y="328" font-size="14" font-weight="800" fill="#2563eb">×</text>
  <circle cx="730" cy="395" r="5" fill="#bbf7d0"/><circle cx="755" cy="400" r="5" fill="#bbf7d0"/><circle cx="745" cy="380" r="5" fill="#bbf7d0"/>
  <text x="742" y="392" font-size="14" font-weight="800" fill="#16a34a">×</text>
  <text x="760" y="418" text-anchor="middle" font-size="8.5" fill="#94a3b8">× = centroid (cluster center)</text>

  <!-- PCA -->
  <rect x="20" y="442" width="880" height="190" rx="12" fill="#fff" stroke="#e2e8f0"/>
  <text x="36" y="466" font-size="14" font-weight="700" fill="#0369a1">PCA — Principal Component Analysis (dimensionality reduction)</text>
  <text x="36" y="486" font-size="11" fill="#64748b">Squeeze many features into a few, keeping most of the information. Find the direction the data spreads the most, then flatten onto it.</text>
  <line x1="120" y1="600" x2="340" y2="600" stroke="#cbd5e1"/><line x1="120" y1="600" x2="120" y2="510" stroke="#cbd5e1"/>
  <circle cx="150" cy="585" r="4" fill="#0f172a"/><circle cx="180" cy="572" r="4" fill="#0f172a"/><circle cx="210" cy="560" r="4" fill="#0f172a"/><circle cx="240" cy="548" r="4" fill="#0f172a"/><circle cx="270" cy="535" r="4" fill="#0f172a"/><circle cx="300" cy="522" r="4" fill="#0f172a"/>
  <line x1="140" y1="592" x2="315" y2="518" stroke="#0369a1" stroke-width="2.5" marker-end="url(#pcaA)"/>
  <text x="200" y="615" font-size="10" fill="#0369a1">main direction of variance</text>
  <text x="430" y="560" font-size="30" fill="#94a3b8">→</text>
  <text x="430" y="585" font-size="10" fill="#64748b">project onto it</text>
  <line x1="560" y1="560" x2="800" y2="560" stroke="#0369a1" stroke-width="3"/>
  <circle cx="585" cy="560" r="4" fill="#0f172a"/><circle cx="620" cy="560" r="4" fill="#0f172a"/><circle cx="660" cy="560" r="4" fill="#0f172a"/><circle cx="700" cy="560" r="4" fill="#0f172a"/><circle cx="740" cy="560" r="4" fill="#0f172a"/><circle cx="775" cy="560" r="4" fill="#0f172a"/>
  <text x="680" y="585" text-anchor="middle" font-size="10" fill="#64748b">2D → 1D, info kept</text>
  <defs><marker id="pcaA" markerWidth="10" markerHeight="10" refX="6" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 Z" fill="#0369a1"/></marker></defs>
</svg>
