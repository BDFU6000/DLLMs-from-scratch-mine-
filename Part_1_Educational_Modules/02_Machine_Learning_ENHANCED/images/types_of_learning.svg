<svg viewBox="0 0 920 540" xmlns="http://www.w3.org/2000/svg" font-family="ui-sans-serif, system-ui, sans-serif">
  <rect width="920" height="540" fill="#f8fafc"/>
  <text x="460" y="34" text-anchor="middle" font-size="22" font-weight="800" fill="#0f172a">The 4 Ways a Machine Can Learn</text>

  <!-- Supervised -->
  <rect x="24" y="56" width="430" height="210" rx="14" fill="#fff" stroke="#e2e8f0"/>
  <text x="44" y="84" font-size="16" font-weight="700" fill="#2563eb">1 · Supervised — learn from answers</text>
  <text x="44" y="106" font-size="12" fill="#64748b">Data comes WITH the correct label. Model learns the boundary.</text>
  <line x1="60" y1="250" x2="430" y2="150" stroke="#0f172a" stroke-width="2" stroke-dasharray="5 4"/>
  <circle cx="90" cy="160" r="7" fill="#dc2626"/><circle cx="120" cy="140" r="7" fill="#dc2626"/><circle cx="150" cy="175" r="7" fill="#dc2626"/><circle cx="110" cy="195" r="7" fill="#dc2626"/><circle cx="80" cy="135" r="7" fill="#dc2626"/>
  <rect x="300" y="195" width="13" height="13" fill="#2563eb"/><rect x="340" y="215" width="13" height="13" fill="#2563eb"/><rect x="370" y="185" width="13" height="13" fill="#2563eb"/><rect x="320" y="240" width="13" height="13" fill="#2563eb"/><rect x="390" y="225" width="13" height="13" fill="#2563eb"/>
  <text x="80" y="125" font-size="10" fill="#dc2626">class A</text><text x="360" y="178" font-size="10" fill="#2563eb">class B</text>

  <!-- Unsupervised -->
  <rect x="466" y="56" width="430" height="210" rx="14" fill="#fff" stroke="#e2e8f0"/>
  <text x="486" y="84" font-size="16" font-weight="700" fill="#16a34a">2 · Unsupervised — find hidden groups</text>
  <text x="486" y="106" font-size="12" fill="#64748b">No labels at all. Model groups similar things on its own.</text>
  <ellipse cx="560" cy="170" rx="48" ry="40" fill="none" stroke="#16a34a" stroke-dasharray="4 4"/>
  <ellipse cx="710" cy="150" rx="42" ry="36" fill="none" stroke="#16a34a" stroke-dasharray="4 4"/>
  <ellipse cx="660" cy="225" rx="42" ry="32" fill="none" stroke="#16a34a" stroke-dasharray="4 4"/>
  <circle cx="545" cy="160" r="6" fill="#94a3b8"/><circle cx="570" cy="175" r="6" fill="#94a3b8"/><circle cx="560" cy="190" r="6" fill="#94a3b8"/><circle cx="575" cy="155" r="6" fill="#94a3b8"/>
  <circle cx="700" cy="145" r="6" fill="#94a3b8"/><circle cx="720" cy="155" r="6" fill="#94a3b8"/><circle cx="710" cy="135" r="6" fill="#94a3b8"/>
  <circle cx="650" cy="220" r="6" fill="#94a3b8"/><circle cx="670" cy="230" r="6" fill="#94a3b8"/><circle cx="660" cy="215" r="6" fill="#94a3b8"/>

  <!-- Semi-supervised -->
  <rect x="24" y="290" width="430" height="220" rx="14" fill="#fff" stroke="#e2e8f0"/>
  <text x="44" y="318" font-size="16" font-weight="700" fill="#a16207">3 · Semi-supervised — a few answers, lots of blanks</text>
  <text x="44" y="340" font-size="12" fill="#64748b">A little labeled data guides a big pile of unlabeled data.</text>
  <circle cx="90" cy="400" r="7" fill="#dc2626"/><rect x="360" y="430" width="13" height="13" fill="#2563eb"/>
  <text x="74" y="425" font-size="9" fill="#dc2626">labeled</text><text x="350" y="455" font-size="9" fill="#2563eb">labeled</text>
  <circle cx="140" cy="420" r="6" fill="#cbd5e1"/><circle cx="180" cy="395" r="6" fill="#cbd5e1"/><circle cx="220" cy="430" r="6" fill="#cbd5e1"/><circle cx="160" cy="455" r="6" fill="#cbd5e1"/><circle cx="260" cy="410" r="6" fill="#cbd5e1"/><circle cx="300" cy="440" r="6" fill="#cbd5e1"/><circle cx="120" cy="380" r="6" fill="#cbd5e1"/><circle cx="240" cy="465" r="6" fill="#cbd5e1"/><circle cx="200" cy="465" r="6" fill="#cbd5e1"/>
  <text x="150" y="490" font-size="9" fill="#94a3b8">grey = unlabeled (cheap &amp; plentiful)</text>

  <!-- Reinforcement -->
  <rect x="466" y="290" width="430" height="220" rx="14" fill="#fff" stroke="#e2e8f0"/>
  <text x="486" y="318" font-size="16" font-weight="700" fill="#7c3aed">4 · Reinforcement — learn by trial &amp; reward</text>
  <text x="486" y="340" font-size="12" fill="#64748b">An agent acts, gets rewards/penalties, improves over time.</text>
  <rect x="500" y="380" width="130" height="56" rx="10" fill="#7c3aed"/><text x="565" y="414" text-anchor="middle" font-size="14" font-weight="700" fill="#fff">AGENT</text>
  <rect x="740" y="380" width="130" height="56" rx="10" fill="#475569"/><text x="805" y="406" text-anchor="middle" font-size="13" font-weight="700" fill="#fff">ENVIRON-</text><text x="805" y="424" text-anchor="middle" font-size="13" font-weight="700" fill="#fff">MENT</text>
  <path d="M630 396 H735" stroke="#0f172a" stroke-width="2" fill="none" marker-end="url(#a2)"/>
  <text x="682" y="388" text-anchor="middle" font-size="10" fill="#0f172a">action</text>
  <path d="M740 424 H635" stroke="#16a34a" stroke-width="2" fill="none" marker-end="url(#a3)"/>
  <text x="687" y="444" text-anchor="middle" font-size="10" fill="#16a34a">reward + new state</text>
  <text x="565" y="470" text-anchor="middle" font-size="10" fill="#94a3b8">(this is how ChatGPT/Claude get aligned: RLHF)</text>
  <defs>
    <marker id="a2" markerWidth="10" markerHeight="10" refX="6" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 Z" fill="#0f172a"/></marker>
    <marker id="a3" markerWidth="10" markerHeight="10" refX="6" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 Z" fill="#16a34a"/></marker>
  </defs>
</svg>
