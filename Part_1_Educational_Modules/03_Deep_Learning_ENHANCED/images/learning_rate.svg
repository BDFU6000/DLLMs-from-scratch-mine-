<svg viewBox="0 0 900 320" xmlns="http://www.w3.org/2000/svg" font-family="ui-sans-serif, system-ui, sans-serif">
  <rect width="900" height="320" fill="#f8fafc"/>
  <text x="450" y="30" text-anchor="middle" font-size="20" font-weight="800" fill="#0f172a">Learning rate: the single most important knob</text>

  <!-- too low -->
  <rect x="20" y="50" width="280" height="250" rx="12" fill="#fff" stroke="#e2e8f0"/>
  <text x="160" y="74" text-anchor="middle" font-size="14" font-weight="700" fill="#dc2626">Too LOW</text>
  <path d="M50 110 C 130 130, 150 270, 160 270 C 170 270, 190 130, 270 110" stroke="#94a3b8" stroke-width="2.5" fill="none"/>
  <circle cx="70" cy="135" r="5" fill="#dc2626"/><circle cx="85" cy="160" r="5" fill="#dc2626"/><circle cx="98" cy="182" r="5" fill="#dc2626"/><circle cx="110" cy="205" r="5" fill="#dc2626"/><circle cx="122" cy="225" r="5" fill="#dc2626"/><circle cx="133" cy="243" r="5" fill="#dc2626"/>
  <text x="160" y="290" text-anchor="middle" font-size="10" fill="#64748b">tiny steps → trains forever</text>

  <!-- just right -->
  <rect x="310" y="50" width="280" height="250" rx="12" fill="#fff" stroke="#bbf7d0"/>
  <text x="450" y="74" text-anchor="middle" font-size="14" font-weight="700" fill="#16a34a">Just RIGHT</text>
  <path d="M340 110 C 420 130, 440 270, 450 270 C 460 270, 480 130, 560 110" stroke="#94a3b8" stroke-width="2.5" fill="none"/>
  <circle cx="360" cy="135" r="6" fill="#16a34a"/><circle cx="395" cy="215" r="6" fill="#16a34a"/><circle cx="430" cy="262" r="6" fill="#16a34a"/><circle cx="450" cy="270" r="7" fill="#16a34a"/>
  <g stroke="#16a34a" stroke-dasharray="3 3"><line x1="366" y1="141" x2="389" y2="209"/><line x1="401" y1="221" x2="424" y2="256"/></g>
  <text x="450" y="290" text-anchor="middle" font-size="10" fill="#64748b">smooth descent to the bottom ✓</text>

  <!-- too high -->
  <rect x="600" y="50" width="280" height="250" rx="12" fill="#fff" stroke="#e2e8f0"/>
  <text x="740" y="74" text-anchor="middle" font-size="14" font-weight="700" fill="#ea580c">Too HIGH</text>
  <path d="M630 110 C 710 130, 730 270, 740 270 C 750 270, 770 130, 850 110" stroke="#94a3b8" stroke-width="2.5" fill="none"/>
  <circle cx="675" cy="150" r="6" fill="#ea580c"/><circle cx="800" cy="135" r="6" fill="#ea580c"/><circle cx="650" cy="120" r="6" fill="#ea580c"/><circle cx="835" cy="112" r="6" fill="#ea580c"/>
  <g stroke="#ea580c" stroke-dasharray="3 3"><line x1="681" y1="155" x2="795" y2="139"/><line x1="794" y1="139" x2="656" y2="124"/><line x1="656" y1="124" x2="829" y2="116"/></g>
  <text x="740" y="290" text-anchor="middle" font-size="10" fill="#64748b">overshoots → diverges 💥</text>
</svg>
