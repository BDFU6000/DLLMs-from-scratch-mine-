<svg viewBox="0 0 780 380" xmlns="http://www.w3.org/2000/svg" font-family="ui-sans-serif, system-ui, sans-serif">
  <rect width="780" height="380" fill="#f8fafc"/>
  <text x="390" y="32" text-anchor="middle" font-size="20" font-weight="800" fill="#0f172a">Learning-rate schedules (changing the step size over time)</text>
  <line x1="80" y1="300" x2="710" y2="300" stroke="#0f172a"/><line x1="80" y1="300" x2="80" y2="70" stroke="#0f172a"/>
  <text x="395" y="335" text-anchor="middle" font-size="12" fill="#475569">training steps →</text>
  <text x="42" y="190" text-anchor="middle" font-size="12" fill="#475569" transform="rotate(-90 42 190)">learning rate →</text>

  <!-- constant -->
  <line x1="80" y1="160" x2="710" y2="160" stroke="#94a3b8" stroke-width="2.5" stroke-dasharray="6 4"/>
  <text x="600" y="152" font-size="11" fill="#94a3b8">Constant (rarely used)</text>

  <!-- step decay -->
  <polyline points="80,110 240,110 240,165 420,165 420,215 600,215 600,255 710,255" stroke="#16a34a" stroke-width="2.5" fill="none"/>
  <text x="250" y="105" font-size="11" fill="#16a34a">Step decay</text>

  <!-- cosine -->
  <path d="M80 100 C 250 110, 400 270, 710 285" stroke="#db2777" stroke-width="2.5" fill="none"/>
  <text x="430" y="262" font-size="11" fill="#db2777">Cosine annealing</text>

  <!-- warmup + decay -->
  <path d="M80 290 L 170 90 C 320 100, 520 270, 710 282" stroke="#2563eb" stroke-width="3" fill="none"/>
  <text x="180" y="85" font-size="11" font-weight="700" fill="#2563eb">Warmup + Decay</text>
  <circle cx="170" cy="90" r="4" fill="#2563eb"/>
  <text x="120" y="318" font-size="9" fill="#2563eb">warmup phase</text>
  <line x1="170" y1="92" x2="170" y2="300" stroke="#2563eb" stroke-dasharray="2 2" opacity="0.4"/>
  <rect x="500" y="80" width="205" height="48" rx="8" fill="#dbeafe"/>
  <text x="602" y="100" text-anchor="middle" font-size="10" fill="#1e3a8a">Warmup+Decay is the standard</text>
  <text x="602" y="116" text-anchor="middle" font-size="10" fill="#1e3a8a">for training Transformers &amp; LLMs</text>
</svg>
