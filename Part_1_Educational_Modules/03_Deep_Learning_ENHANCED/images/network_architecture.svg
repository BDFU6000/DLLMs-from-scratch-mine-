<svg viewBox="0 0 840 440" xmlns="http://www.w3.org/2000/svg" font-family="ui-sans-serif, system-ui, sans-serif">
  <rect width="840" height="440" fill="#f8fafc"/>
  <text x="420" y="32" text-anchor="middle" font-size="20" font-weight="800" fill="#0f172a">A feedforward neural network</text>
  <text x="420" y="54" text-anchor="middle" font-size="12" fill="#64748b">Information flows left → right. "Deep" just means more than one hidden layer.</text>
  <g stroke="#cbd5e1" stroke-width="1">
    <!-- edges input->h1 -->
    <line x1="120" y1="120" x2="300" y2="110"/><line x1="120" y1="120" x2="300" y2="180"/><line x1="120" y1="120" x2="300" y2="250"/><line x1="120" y1="120" x2="300" y2="320"/>
    <line x1="120" y1="220" x2="300" y2="110"/><line x1="120" y1="220" x2="300" y2="180"/><line x1="120" y1="220" x2="300" y2="250"/><line x1="120" y1="220" x2="300" y2="320"/>
    <line x1="120" y1="320" x2="300" y2="110"/><line x1="120" y1="320" x2="300" y2="180"/><line x1="120" y1="320" x2="300" y2="250"/><line x1="120" y1="320" x2="300" y2="320"/>
    <!-- h1->h2 -->
    <line x1="300" y1="110" x2="500" y2="110"/><line x1="300" y1="110" x2="500" y2="180"/><line x1="300" y1="110" x2="500" y2="250"/><line x1="300" y1="110" x2="500" y2="320"/>
    <line x1="300" y1="180" x2="500" y2="110"/><line x1="300" y1="180" x2="500" y2="180"/><line x1="300" y1="180" x2="500" y2="250"/><line x1="300" y1="180" x2="500" y2="320"/>
    <line x1="300" y1="250" x2="500" y2="110"/><line x1="300" y1="250" x2="500" y2="180"/><line x1="300" y1="250" x2="500" y2="250"/><line x1="300" y1="250" x2="500" y2="320"/>
    <line x1="300" y1="320" x2="500" y2="110"/><line x1="300" y1="320" x2="500" y2="180"/><line x1="300" y1="320" x2="500" y2="250"/><line x1="300" y1="320" x2="500" y2="320"/>
    <!-- h2->out -->
    <line x1="500" y1="110" x2="700" y2="180"/><line x1="500" y1="110" x2="700" y2="260"/>
    <line x1="500" y1="180" x2="700" y2="180"/><line x1="500" y1="180" x2="700" y2="260"/>
    <line x1="500" y1="250" x2="700" y2="180"/><line x1="500" y1="250" x2="700" y2="260"/>
    <line x1="500" y1="320" x2="700" y2="180"/><line x1="500" y1="320" x2="700" y2="260"/>
  </g>
  <!-- input nodes -->
  <g fill="#dbeafe" stroke="#2563eb"><circle cx="120" cy="120" r="20"/><circle cx="120" cy="220" r="20"/><circle cx="120" cy="320" r="20"/></g>
  <!-- hidden1 -->
  <g fill="#dcfce7" stroke="#16a34a"><circle cx="300" cy="110" r="20"/><circle cx="300" cy="180" r="20"/><circle cx="300" cy="250" r="20"/><circle cx="300" cy="320" r="20"/></g>
  <!-- hidden2 -->
  <g fill="#dcfce7" stroke="#16a34a"><circle cx="500" cy="110" r="20"/><circle cx="500" cy="180" r="20"/><circle cx="500" cy="250" r="20"/><circle cx="500" cy="320" r="20"/></g>
  <!-- output -->
  <g fill="#ede9fe" stroke="#7c3aed"><circle cx="700" cy="180" r="20"/><circle cx="700" cy="260" r="20"/></g>
  <text x="120" y="375" text-anchor="middle" font-size="13" font-weight="700" fill="#2563eb">Input layer</text>
  <text x="120" y="392" text-anchor="middle" font-size="10" fill="#64748b">raw data</text>
  <text x="400" y="375" text-anchor="middle" font-size="13" font-weight="700" fill="#16a34a">Hidden layers</text>
  <text x="400" y="392" text-anchor="middle" font-size="10" fill="#64748b">learn patterns (the "deep" part)</text>
  <text x="700" y="375" text-anchor="middle" font-size="13" font-weight="700" fill="#7c3aed">Output layer</text>
  <text x="700" y="392" text-anchor="middle" font-size="10" fill="#64748b">prediction</text>
</svg>
