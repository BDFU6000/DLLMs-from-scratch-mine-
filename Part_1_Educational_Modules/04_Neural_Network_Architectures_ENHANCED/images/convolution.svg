<svg viewBox="0 0 780 380" xmlns="http://www.w3.org/2000/svg" font-family="ui-sans-serif, system-ui, sans-serif">
  <rect width="780" height="380" fill="#f8fafc"/>
  <text x="390" y="32" text-anchor="middle" font-size="20" font-weight="800" fill="#0f172a">Convolution: a small filter slides across the image</text>
  <text x="130" y="62" text-anchor="middle" font-size="12" fill="#475569">Input image (pixels)</text>
  <g>
    <rect x="40" y="75" width="180" height="180" fill="#fff" stroke="#cbd5e1"/>
    <g stroke="#e2e8f0"><line x1="70" y1="75" x2="70" y2="255"/><line x1="100" y1="75" x2="100" y2="255"/><line x1="130" y1="75" x2="130" y2="255"/><line x1="160" y1="75" x2="160" y2="255"/><line x1="190" y1="75" x2="190" y2="255"/>
    <line x1="40" y1="105" x2="220" y2="105"/><line x1="40" y1="135" x2="220" y2="135"/><line x1="40" y1="165" x2="220" y2="165"/><line x1="40" y1="195" x2="220" y2="195"/><line x1="40" y1="225" x2="220" y2="225"/></g>
    <rect x="40" y="75" width="90" height="90" fill="#fde68a" fill-opacity="0.6" stroke="#ca8a04" stroke-width="2.5"/>
    <text x="85" y="125" text-anchor="middle" font-size="11" font-weight="700" fill="#92400e">3×3 filter</text>
  </g>
  <text x="130" y="278" text-anchor="middle" font-size="10" fill="#64748b">filter shifts by the "stride"; "padding" adds a 0-border for edges</text>
  <text x="340" y="160" font-size="26" fill="#94a3b8">→</text>
  <text x="340" y="185" font-size="10" fill="#64748b">multiply</text><text x="340" y="198" font-size="10" fill="#64748b">&amp; sum</text>
  <text x="560" y="62" text-anchor="middle" font-size="12" fill="#475569">Feature map (where the pattern was found)</text>
  <g>
    <rect x="490" y="95" width="140" height="140" fill="#fff" stroke="#cbd5e1"/>
    <g stroke="#e2e8f0"><line x1="525" y1="95" x2="525" y2="235"/><line x1="560" y1="95" x2="560" y2="235"/><line x1="595" y1="95" x2="595" y2="235"/>
    <line x1="490" y1="130" x2="630" y2="130"/><line x1="490" y1="165" x2="630" y2="165"/><line x1="490" y1="200" x2="630" y2="200"/></g>
    <rect x="490" y="95" width="35" height="35" fill="#86efac" stroke="#16a34a" stroke-width="2"/>
    <text x="507" y="118" text-anchor="middle" font-size="12" font-weight="700" fill="#166534">8</text>
  </g>
  <text x="390" y="310" text-anchor="middle" font-size="12" fill="#0f172a">"Parameter sharing": the SAME filter is dragged everywhere → far fewer weights,</text>
  <text x="390" y="330" text-anchor="middle" font-size="12" fill="#0f172a">and it detects a cat's ear no matter where it appears (translation invariance).</text>
</svg>
