<svg viewBox="0 0 760 380" xmlns="http://www.w3.org/2000/svg" font-family="ui-sans-serif, system-ui, sans-serif">
  <rect width="760" height="380" fill="#f8fafc"/>
  <text x="380" y="32" text-anchor="middle" font-size="20" font-weight="800" fill="#0f172a">Feedforward Net (FNN / MLP): "fully connected"</text>
  <g stroke="#cbd5e1" stroke-width="1">
    <line x1="120" y1="120" x2="320" y2="100"/><line x1="120" y1="120" x2="320" y2="170"/><line x1="120" y1="120" x2="320" y2="240"/><line x1="120" y1="120" x2="320" y2="310"/>
    <line x1="120" y1="210" x2="320" y2="100"/><line x1="120" y1="210" x2="320" y2="170"/><line x1="120" y1="210" x2="320" y2="240"/><line x1="120" y1="210" x2="320" y2="310"/>
    <line x1="120" y1="300" x2="320" y2="100"/><line x1="120" y1="300" x2="320" y2="170"/><line x1="120" y1="300" x2="320" y2="240"/><line x1="120" y1="300" x2="320" y2="310"/>
    <line x1="320" y1="100" x2="520" y2="170"/><line x1="320" y1="100" x2="520" y2="250"/>
    <line x1="320" y1="170" x2="520" y2="170"/><line x1="320" y1="170" x2="520" y2="250"/>
    <line x1="320" y1="240" x2="520" y2="170"/><line x1="320" y1="240" x2="520" y2="250"/>
    <line x1="320" y1="310" x2="520" y2="170"/><line x1="320" y1="310" x2="520" y2="250"/>
  </g>
  <g fill="#dbeafe" stroke="#2563eb"><circle cx="120" cy="120" r="18"/><circle cx="120" cy="210" r="18"/><circle cx="120" cy="300" r="18"/></g>
  <g fill="#dcfce7" stroke="#16a34a"><circle cx="320" cy="100" r="18"/><circle cx="320" cy="170" r="18"/><circle cx="320" cy="240" r="18"/><circle cx="320" cy="310" r="18"/></g>
  <g fill="#ede9fe" stroke="#7c3aed"><circle cx="520" cy="170" r="18"/><circle cx="520" cy="250" r="18"/></g>
  <text x="120" y="345" text-anchor="middle" font-size="11" fill="#2563eb">input</text>
  <text x="320" y="345" text-anchor="middle" font-size="11" fill="#16a34a">hidden (dense)</text>
  <text x="520" y="300" text-anchor="middle" font-size="11" fill="#7c3aed">output</text>
  <rect x="560" y="90" width="185" height="200" rx="10" fill="#fef2f2" stroke="#fecaca"/>
  <text x="652" y="115" text-anchor="middle" font-size="12" font-weight="700" fill="#b91c1c">The problem with images</text>
  <text x="572" y="142" font-size="10.5" fill="#7f1d1d">A 1000×1000 color image</text>
  <text x="572" y="160" font-size="10.5" fill="#7f1d1d">= 3,000,000 input pixels.</text>
  <text x="572" y="182" font-size="10.5" fill="#7f1d1d">One hidden layer of 1000</text>
  <text x="572" y="200" font-size="10.5" fill="#7f1d1d">→ <tspan font-weight="700">3 BILLION weights</tspan>.</text>
  <text x="572" y="226" font-size="10.5" fill="#7f1d1d">Impossible + overfits, and</text>
  <text x="572" y="244" font-size="10.5" fill="#7f1d1d">move the cat → it fails to</text>
  <text x="572" y="262" font-size="10.5" fill="#7f1d1d">recognize it. CNNs fix this.</text>
</svg>
