<svg viewBox="0 0 840 380" xmlns="http://www.w3.org/2000/svg" font-family="ui-sans-serif, system-ui, sans-serif">
  <rect width="840" height="380" fill="#f8fafc"/>
  <text x="420" y="32" text-anchor="middle" font-size="20" font-weight="800" fill="#0f172a">The LSTM cell: gates control a memory "conveyor belt"</text>
  <defs><marker id="l" markerWidth="9" markerHeight="9" refX="6" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 Z" fill="#0f172a"/></marker></defs>
  <!-- cell state conveyor belt -->
  <line x1="40" y1="100" x2="800" y2="100" stroke="#7c3aed" stroke-width="5" marker-end="url(#l)"/>
  <text x="60" y="88" font-size="12" font-weight="700" fill="#7c3aed">Cell state (long-term memory) — flows mostly unchanged</text>
  <rect x="120" y="150" width="600" height="170" rx="14" fill="#fff" stroke="#cbd5e1"/>
  <text x="420" y="345" text-anchor="middle" font-size="11" fill="#64748b">One LSTM step. Each gate is a sigmoid "valve" (0 = block, 1 = let through).</text>
  <!-- gates -->
  <g>
    <circle cx="220" cy="100" r="22" fill="#fecaca" stroke="#dc2626"/><text x="220" y="105" text-anchor="middle" font-size="16" fill="#991b1b">×</text>
    <rect x="180" y="200" width="80" height="50" rx="8" fill="#fee2e2" stroke="#dc2626"/><text x="220" y="222" text-anchor="middle" font-size="11" font-weight="700" fill="#991b1b">Forget</text><text x="220" y="238" text-anchor="middle" font-size="9" fill="#991b1b">σ gate</text>
    <line x1="220" y1="200" x2="220" y2="124" stroke="#dc2626" stroke-width="1.5" marker-end="url(#l)"/>

    <circle cx="420" cy="100" r="22" fill="#bbf7d0" stroke="#16a34a"/><text x="420" y="106" text-anchor="middle" font-size="16" fill="#166534">+</text>
    <rect x="380" y="200" width="80" height="50" rx="8" fill="#dcfce7" stroke="#16a34a"/><text x="420" y="222" text-anchor="middle" font-size="11" font-weight="700" fill="#166534">Input</text><text x="420" y="238" text-anchor="middle" font-size="9" fill="#166534">σ gate</text>
    <line x1="420" y1="200" x2="420" y2="124" stroke="#16a34a" stroke-width="1.5" marker-end="url(#l)"/>

    <rect x="600" y="200" width="80" height="50" rx="8" fill="#dbeafe" stroke="#2563eb"/><text x="640" y="222" text-anchor="middle" font-size="11" font-weight="700" fill="#1e3a8a">Output</text><text x="640" y="238" text-anchor="middle" font-size="9" fill="#1e3a8a">σ gate</text>
    <line x1="640" y1="200" x2="640" y2="124" stroke="#2563eb" stroke-width="1.5" marker-end="url(#l)"/>
    <line x1="660" y1="210" x2="740" y2="210" stroke="#2563eb" stroke-width="2" marker-end="url(#l)"/>
    <text x="755" y="214" font-size="10" fill="#1e3a8a">h out</text>
  </g>
  <text x="220" y="285" text-anchor="middle" font-size="9.5" fill="#64748b">"throw away</text><text x="220" y="297" text-anchor="middle" font-size="9.5" fill="#64748b">old info"</text>
  <text x="420" y="285" text-anchor="middle" font-size="9.5" fill="#64748b">"add new</text><text x="420" y="297" text-anchor="middle" font-size="9.5" fill="#64748b">info"</text>
  <text x="640" y="285" text-anchor="middle" font-size="9.5" fill="#64748b">"what to</text><text x="640" y="297" text-anchor="middle" font-size="9.5" fill="#64748b">output now"</text>
  <text x="120" y="170" font-size="10" fill="#94a3b8">GRU = a simpler LSTM: merges forget+input into one "update" gate → fewer parameters, faster.</text>
</svg>
