<svg viewBox="0 0 820 320" xmlns="http://www.w3.org/2000/svg" font-family="ui-sans-serif, system-ui, sans-serif">
  <rect width="820" height="320" fill="#f8fafc"/>
  <text x="410" y="32" text-anchor="middle" font-size="20" font-weight="800" fill="#0f172a">Multi-Head Attention: several attentions in parallel</text>
  <text x="410" y="56" text-anchor="middle" font-size="12" fill="#64748b">Each "head" learns to focus on a different kind of relationship</text>
  <defs><marker id="m" markerWidth="9" markerHeight="9" refX="6" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 Z" fill="#64748b"/></marker></defs>
  <rect x="60" y="90" width="180" height="60" rx="10" fill="#dbeafe" stroke="#2563eb"/><text x="150" y="116" text-anchor="middle" font-size="12" font-weight="700" fill="#1e3a8a">Head 1</text><text x="150" y="134" text-anchor="middle" font-size="10" fill="#1e3a8a">grammar / syntax</text>
  <rect x="320" y="90" width="180" height="60" rx="10" fill="#dcfce7" stroke="#16a34a"/><text x="410" y="116" text-anchor="middle" font-size="12" font-weight="700" fill="#166534">Head 2</text><text x="410" y="134" text-anchor="middle" font-size="10" fill="#166534">facts / entities</text>
  <rect x="580" y="90" width="180" height="60" rx="10" fill="#fce7f3" stroke="#db2777"/><text x="670" y="116" text-anchor="middle" font-size="12" font-weight="700" fill="#9d174d">Head 3</text><text x="670" y="134" text-anchor="middle" font-size="10" fill="#9d174d">sentiment / tone</text>
  <text x="410" y="180" text-anchor="middle" font-size="14" fill="#94a3b8">· · · (e.g. 12, 32, or more heads) · · ·</text>
  <line x1="150" y1="150" x2="370" y2="205" stroke="#64748b" stroke-width="1.5" marker-end="url(#m)"/>
  <line x1="410" y1="150" x2="410" y2="205" stroke="#64748b" stroke-width="1.5" marker-end="url(#m)"/>
  <line x1="670" y1="150" x2="450" y2="205" stroke="#64748b" stroke-width="1.5" marker-end="url(#m)"/>
  <rect x="300" y="210" width="220" height="44" rx="10" fill="#1e293b"/><text x="410" y="237" text-anchor="middle" font-size="12" font-weight="700" fill="#fff">Concatenate + Feedforward</text>
  <line x1="410" y1="254" x2="410" y2="285" stroke="#64748b" stroke-width="1.5" marker-end="url(#m)"/>
  <text x="410" y="302" text-anchor="middle" font-size="11" fill="#475569">one richer representation of each word</text>
</svg>
