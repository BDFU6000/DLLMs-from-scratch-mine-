<svg viewBox="0 0 720 320" xmlns="http://www.w3.org/2000/svg" font-family="ui-sans-serif, system-ui, sans-serif">
  <rect width="720" height="320" fill="#f8fafc"/>
  <text x="360" y="32" text-anchor="middle" font-size="20" font-weight="800" fill="#0f172a">Max Pooling: shrink the data, keep the strongest signal</text>
  <text x="150" y="70" text-anchor="middle" font-size="12" fill="#475569">feature map (4×4)</text>
  <g font-size="14" text-anchor="middle">
    <rect x="60" y="85" width="180" height="180" fill="#fff" stroke="#cbd5e1"/>
    <rect x="60" y="85" width="90" height="90" fill="#dbeafe" stroke="#2563eb" stroke-width="2"/>
    <rect x="150" y="85" width="90" height="90" fill="#fce7f3" stroke="#db2777" stroke-width="2"/>
    <rect x="60" y="175" width="90" height="90" fill="#dcfce7" stroke="#16a34a" stroke-width="2"/>
    <rect x="150" y="175" width="90" height="90" fill="#fef9c3" stroke="#ca8a04" stroke-width="2"/>
    <text x="82" y="118">1</text><text x="127" y="118">3</text><text x="172" y="118">2</text><text x="217" y="118">0</text>
    <text x="82" y="163">4</text><text x="127" y="163" font-weight="800" fill="#2563eb">8</text><text x="172" y="163">1</text><text x="217" y="163" font-weight="800" fill="#db2777">9</text>
    <text x="82" y="208">2</text><text x="127" y="208">1</text><text x="172" y="208">5</text><text x="217" y="208">3</text>
    <text x="82" y="253" font-weight="800" fill="#16a34a">6</text><text x="127" y="253">0</text><text x="172" y="253">2</text><text x="217" y="253" font-weight="800" fill="#ca8a04">7</text>
  </g>
  <text x="320" y="180" font-size="26" fill="#94a3b8">→</text>
  <text x="320" y="205" font-size="10" fill="#64748b">keep max</text>
  <text x="500" y="70" text-anchor="middle" font-size="12" fill="#475569">output (2×2)</text>
  <g font-size="18" text-anchor="middle" font-weight="800">
    <rect x="430" y="120" width="140" height="110" fill="#fff" stroke="#cbd5e1"/>
    <rect x="430" y="120" width="70" height="55" fill="#dbeafe" stroke="#2563eb"/><text x="465" y="155" fill="#2563eb">8</text>
    <rect x="500" y="120" width="70" height="55" fill="#fce7f3" stroke="#db2777"/><text x="535" y="155" fill="#db2777">9</text>
    <rect x="430" y="175" width="70" height="55" fill="#dcfce7" stroke="#16a34a"/><text x="465" y="210" fill="#16a34a">6</text>
    <rect x="500" y="175" width="70" height="55" fill="#fef9c3" stroke="#ca8a04"/><text x="535" y="210" fill="#ca8a04">7</text>
  </g>
  <text x="360" y="295" text-anchor="middle" font-size="11" fill="#64748b">Halves the width &amp; height → less computation, and robust to tiny shifts in the image.</text>
</svg>
