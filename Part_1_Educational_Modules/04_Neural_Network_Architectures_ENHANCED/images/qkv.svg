<svg viewBox="0 0 820 340" xmlns="http://www.w3.org/2000/svg" font-family="ui-sans-serif, system-ui, sans-serif">
  <rect width="820" height="340" fill="#f8fafc"/>
  <text x="410" y="32" text-anchor="middle" font-size="20" font-weight="800" fill="#0f172a">How attention is computed: Query, Key, Value</text>
  <text x="410" y="56" text-anchor="middle" font-size="12" fill="#64748b">Like a search engine: a Query matches Keys to retrieve the right Values</text>
  <defs><marker id="q" markerWidth="9" markerHeight="9" refX="6" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 Z" fill="#64748b"/></marker></defs>
  <rect x="40" y="110" width="150" height="80" rx="12" fill="#ede9fe" stroke="#7c3aed"/>
  <text x="115" y="140" text-anchor="middle" font-size="14" font-weight="700" fill="#5b21b6">Query (Q)</text>
  <text x="115" y="162" text-anchor="middle" font-size="10" fill="#5b21b6">"what am I</text><text x="115" y="176" text-anchor="middle" font-size="10" fill="#5b21b6">looking for?"</text>
  <rect x="40" y="220" width="150" height="70" rx="12" fill="#dbeafe" stroke="#2563eb"/>
  <text x="115" y="248" text-anchor="middle" font-size="14" font-weight="700" fill="#1e3a8a">Keys (K)</text>
  <text x="115" y="270" text-anchor="middle" font-size="10" fill="#1e3a8a">"what each word contains"</text>
  <line x1="190" y1="155" x2="270" y2="180" stroke="#64748b" stroke-width="1.5" marker-end="url(#q)"/>
  <line x1="190" y1="250" x2="270" y2="210" stroke="#64748b" stroke-width="1.5" marker-end="url(#q)"/>
  <rect x="275" y="165" width="150" height="60" rx="10" fill="#fff" stroke="#cbd5e1"/>
  <text x="350" y="190" text-anchor="middle" font-size="12" font-weight="700" fill="#0f172a">Q · K</text>
  <text x="350" y="210" text-anchor="middle" font-size="9" fill="#64748b">match scores</text>
  <line x1="425" y1="195" x2="475" y2="195" stroke="#64748b" stroke-width="1.5" marker-end="url(#q)"/>
  <rect x="480" y="165" width="150" height="60" rx="10" fill="#fef9c3" stroke="#ca8a04"/>
  <text x="555" y="190" text-anchor="middle" font-size="12" font-weight="700" fill="#92400e">Softmax</text>
  <text x="555" y="210" text-anchor="middle" font-size="9" fill="#92400e">→ attention weights (sum to 1)</text>
  <rect x="480" y="250" width="150" height="60" rx="12" fill="#dcfce7" stroke="#16a34a"/>
  <text x="555" y="276" text-anchor="middle" font-size="13" font-weight="700" fill="#166534">Values (V)</text>
  <text x="555" y="296" text-anchor="middle" font-size="9" fill="#166534">the actual info</text>
  <line x1="630" y1="195" x2="690" y2="240" stroke="#64748b" stroke-width="1.5" marker-end="url(#q)"/>
  <line x1="630" y1="280" x2="690" y2="245" stroke="#64748b" stroke-width="1.5" marker-end="url(#q)"/>
  <rect x="695" y="210" width="100" height="60" rx="12" fill="#1e293b"/>
  <text x="745" y="236" text-anchor="middle" font-size="12" font-weight="700" fill="#fff">Output</text>
  <text x="745" y="254" text-anchor="middle" font-size="9" fill="#94a3b8">context-aware</text>
  <text x="410" y="330" text-anchor="middle" font-size="11" fill="#475569">Formula: softmax( (Q · Kᵀ) / √d ) · V   — weighted blend of values, by how well Q matches each K.</text>
</svg>
