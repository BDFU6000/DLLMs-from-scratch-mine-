<svg viewBox="0 0 920 360" xmlns="http://www.w3.org/2000/svg" font-family="ui-sans-serif, system-ui, sans-serif">
  <rect width="920" height="360" fill="#f8fafc"/>
  <text x="460" y="32" text-anchor="middle" font-size="20" font-weight="800" fill="#0f172a">RNN: a network with memory (the "hidden state")</text>
  <text x="460" y="56" text-anchor="middle" font-size="12" fill="#64748b">"I grew up in France ... so I speak fluent ___"  → needs to remember "France" to predict "French"</text>
  <defs><marker id="r" markerWidth="9" markerHeight="9" refX="6" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 Z" fill="#16a34a"/></marker></defs>
  <g>
    <rect x="60" y="150" width="80" height="70" rx="10" fill="#dcfce7" stroke="#16a34a"/><text x="100" y="190" text-anchor="middle" font-size="13" fill="#166534">RNN</text>
    <rect x="230" y="150" width="80" height="70" rx="10" fill="#dcfce7" stroke="#16a34a"/><text x="270" y="190" text-anchor="middle" font-size="13" fill="#166534">RNN</text>
    <rect x="400" y="150" width="80" height="70" rx="10" fill="#dcfce7" stroke="#16a34a"/><text x="440" y="190" text-anchor="middle" font-size="13" fill="#166534">RNN</text>
    <rect x="600" y="150" width="80" height="70" rx="10" fill="#dcfce7" stroke="#16a34a"/><text x="640" y="190" text-anchor="middle" font-size="13" fill="#166534">RNN</text>
    <rect x="770" y="150" width="80" height="70" rx="10" fill="#fde68a" stroke="#ca8a04"/><text x="810" y="190" text-anchor="middle" font-size="13" fill="#92400e">RNN</text>
  </g>
  <text x="470" y="190" text-anchor="middle" font-size="20" fill="#94a3b8">· · ·</text>
  <!-- hidden state arrows -->
  <line x1="140" y1="185" x2="228" y2="185" stroke="#16a34a" stroke-width="2" marker-end="url(#r)"/>
  <line x1="310" y1="185" x2="398" y2="185" stroke="#16a34a" stroke-width="2" marker-end="url(#r)"/>
  <line x1="480" y1="185" x2="560" y2="185" stroke="#16a34a" stroke-width="2" marker-end="url(#r)"/>
  <line x1="680" y1="185" x2="768" y2="185" stroke="#16a34a" stroke-width="2" marker-end="url(#r)"/>
  <text x="184" y="178" text-anchor="middle" font-size="9" fill="#16a34a">h (memory)</text>
  <!-- inputs -->
  <g font-size="12" text-anchor="middle" fill="#1e3a8a">
    <text x="100" y="270">"I"</text><text x="270" y="270">"grew"</text><text x="440" y="270">"France"</text><text x="640" y="270">"fluent"</text><text x="810" y="270">"___?"</text>
  </g>
  <g stroke="#2563eb" stroke-width="1.5"><line x1="100" y1="255" x2="100" y2="222"/><line x1="270" y1="255" x2="270" y2="222"/><line x1="440" y1="255" x2="440" y2="222"/><line x1="640" y1="255" x2="640" y2="222"/><line x1="810" y1="255" x2="810" y2="222"/></g>
  <!-- vanishing gradient -->
  <path d="M810 130 C 600 90, 300 90, 100 130" stroke="#dc2626" stroke-width="2" fill="none" stroke-dasharray="5 4" opacity="0.7"/>
  <text x="455" y="92" text-anchor="middle" font-size="11" fill="#dc2626">⚠ Vanishing gradient: the signal fades going back → early words get forgotten</text>
</svg>
