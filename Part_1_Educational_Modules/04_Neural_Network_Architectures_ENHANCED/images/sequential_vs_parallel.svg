<svg viewBox="0 0 820 320" xmlns="http://www.w3.org/2000/svg" font-family="ui-sans-serif, system-ui, sans-serif">
  <rect width="820" height="320" fill="#f8fafc"/>
  <text x="410" y="32" text-anchor="middle" font-size="20" font-weight="800" fill="#0f172a">Why Transformers won: parallel, not sequential</text>
  <defs><marker id="s" markerWidth="9" markerHeight="9" refX="6" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 Z" fill="#dc2626"/></marker></defs>
  <text x="60" y="90" font-size="13" font-weight="700" fill="#dc2626">RNN / LSTM — one word at a time (slow)</text>
  <g>
    <rect x="60" y="105" width="70" height="44" rx="8" fill="#fee2e2" stroke="#dc2626"/><text x="95" y="132" text-anchor="middle" font-size="12" fill="#991b1b">word 1</text>
    <rect x="180" y="105" width="70" height="44" rx="8" fill="#fee2e2" stroke="#dc2626"/><text x="215" y="132" text-anchor="middle" font-size="12" fill="#991b1b">word 2</text>
    <rect x="300" y="105" width="70" height="44" rx="8" fill="#fee2e2" stroke="#dc2626"/><text x="335" y="132" text-anchor="middle" font-size="12" fill="#991b1b">word 3</text>
    <rect x="420" y="105" width="70" height="44" rx="8" fill="#fee2e2" stroke="#dc2626"/><text x="455" y="132" text-anchor="middle" font-size="12" fill="#991b1b">word 4</text>
    <line x1="130" y1="127" x2="178" y2="127" stroke="#dc2626" stroke-width="2" marker-end="url(#s)"/>
    <line x1="250" y1="127" x2="298" y2="127" stroke="#dc2626" stroke-width="2" marker-end="url(#s)"/>
    <line x1="370" y1="127" x2="418" y2="127" stroke="#dc2626" stroke-width="2" marker-end="url(#s)"/>
  </g>
  <text x="560" y="132" font-size="11" fill="#dc2626">must wait for each step → can't use full GPU</text>
  <text x="60" y="215" font-size="13" font-weight="700" fill="#16a34a">Transformer — all words at once (fast)</text>
  <g fill="#dcfce7" stroke="#16a34a">
    <rect x="60" y="230" width="70" height="44" rx="8"/><rect x="180" y="230" width="70" height="44" rx="8"/><rect x="300" y="230" width="70" height="44" rx="8"/><rect x="420" y="230" width="70" height="44" rx="8"/>
  </g>
  <g text-anchor="middle" font-size="12" fill="#166534"><text x="95" y="257">word 1</text><text x="215" y="257">word 2</text><text x="335" y="257">word 3</text><text x="455" y="257">word 4</text></g>
  <text x="560" y="257" font-size="11" fill="#16a34a">processed in parallel → scales to huge models</text>
</svg>
