<svg viewBox="0 0 900 330" xmlns="http://www.w3.org/2000/svg" font-family="ui-sans-serif, system-ui, sans-serif">
  <rect width="900" height="330" fill="#f8fafc"/>
  <text x="450" y="34" text-anchor="middle" font-size="20" font-weight="800" fill="#0f172a">Three Transformer flavors</text>
  <defs><marker id="ar" markerWidth="8" markerHeight="8" refX="5" refY="3" orient="auto"><path d="M0,0 L5,3 L0,6 Z" fill="#64748b"/></marker></defs>

  <rect x="30" y="60" width="270" height="240" rx="12" fill="#fff" stroke="#7c3aed" stroke-width="2"/>
  <text x="165" y="88" text-anchor="middle" font-size="15" font-weight="700" fill="#5b21b6">Decoder-only</text>
  <text x="165" y="108" text-anchor="middle" font-size="11" fill="#64748b">GENERATIVE · next-token</text>
  <g font-size="12" text-anchor="middle"><text x="80" y="150">w1</text><text x="125" y="150">w2</text><text x="170" y="150">w3</text><text x="215" y="150">w4</text></g>
  <path d="M125 160 C 110 185 95 185 82 162" stroke="#7c3aed" fill="none" marker-end="url(#ar)"/>
  <path d="M170 160 C 150 190 110 190 82 162" stroke="#7c3aed" fill="none" marker-end="url(#ar)"/>
  <path d="M170 160 C 158 185 140 185 128 162" stroke="#7c3aed" fill="none" marker-end="url(#ar)"/>
  <text x="165" y="220" text-anchor="middle" font-size="11" fill="#5b21b6">causal mask: only looks BACK</text>
  <text x="165" y="270" text-anchor="middle" font-size="12" font-weight="700" fill="#0f172a">GPT · Claude · LLaMA</text>

  <rect x="315" y="60" width="270" height="240" rx="12" fill="#fff" stroke="#2563eb" stroke-width="2"/>
  <text x="450" y="88" text-anchor="middle" font-size="15" font-weight="700" fill="#1e3a8a">Encoder-only</text>
  <text x="450" y="108" text-anchor="middle" font-size="11" fill="#64748b">UNDERSTANDING · bidirectional</text>
  <g font-size="12" text-anchor="middle"><text x="365" y="150">w1</text><text x="410" y="150">w2</text><text x="455" y="150">w3</text><text x="500" y="150">w4</text></g>
  <path d="M410 160 C 400 185 375 185 367 162" stroke="#2563eb" fill="none" marker-end="url(#ar)"/>
  <path d="M455 160 C 470 185 495 185 503 162" stroke="#2563eb" fill="none" marker-end="url(#ar)"/>
  <path d="M410 160 C 425 188 480 188 500 162" stroke="#2563eb" fill="none" marker-end="url(#ar)"/>
  <text x="450" y="220" text-anchor="middle" font-size="11" fill="#1e3a8a">looks BOTH ways</text>
  <text x="450" y="270" text-anchor="middle" font-size="12" font-weight="700" fill="#0f172a">BERT · RoBERTa</text>

  <rect x="600" y="60" width="270" height="240" rx="12" fill="#fff" stroke="#16a34a" stroke-width="2"/>
  <text x="735" y="88" text-anchor="middle" font-size="15" font-weight="700" fill="#166534">Encoder-Decoder</text>
  <text x="735" y="108" text-anchor="middle" font-size="11" fill="#64748b">SEQ-TO-SEQ</text>
  <rect x="630" y="135" width="90" height="50" rx="8" fill="#dcfce7" stroke="#16a34a"/><text x="675" y="165" text-anchor="middle" font-size="11" fill="#166534">Encoder</text>
  <rect x="750" y="135" width="90" height="50" rx="8" fill="#dbeafe" stroke="#2563eb"/><text x="795" y="165" text-anchor="middle" font-size="11" fill="#1e3a8a">Decoder</text>
  <line x1="720" y1="160" x2="748" y2="160" stroke="#64748b" stroke-width="1.5" marker-end="url(#ar)"/>
  <text x="735" y="220" text-anchor="middle" font-size="11" fill="#166534">read input → generate output</text>
  <text x="735" y="270" text-anchor="middle" font-size="12" font-weight="700" fill="#0f172a">T5 · BART (translation)</text>
