<svg viewBox="0 0 840 280" xmlns="http://www.w3.org/2000/svg" font-family="ui-sans-serif, system-ui, sans-serif">
  <rect width="840" height="280" fill="#f8fafc"/>
  <text x="420" y="34" text-anchor="middle" font-size="20" font-weight="800" fill="#0f172a">Why a base model isn't a chatbot</text>
  <rect x="270" y="56" width="300" height="40" rx="10" fill="#1e293b"/><text x="420" y="81" text-anchor="middle" font-size="13" fill="#fff">Prompt: "What is the capital of France?"</text>
  <rect x="40" y="130" width="360" height="110" rx="12" fill="#fee2e2" stroke="#dc2626"/>
  <text x="220" y="158" text-anchor="middle" font-size="14" font-weight="700" fill="#991b1b">BASE model (after pretraining)</text>
  <text x="220" y="186" text-anchor="middle" font-size="12" fill="#7f1d1d">"What is the capital of Germany?</text>
  <text x="220" y="204" text-anchor="middle" font-size="12" fill="#7f1d1d">What is the capital of Spain?"</text>
  <text x="220" y="228" text-anchor="middle" font-size="11" fill="#dc2626">❌ just continues the pattern</text>
  <rect x="440" y="130" width="360" height="110" rx="12" fill="#dcfce7" stroke="#16a34a"/>
  <text x="620" y="158" text-anchor="middle" font-size="14" font-weight="700" fill="#166534">INSTRUCT model (after SFT)</text>
  <text x="620" y="190" text-anchor="middle" font-size="12" fill="#14532d">"The capital of France is Paris."</text>
  <text x="620" y="228" text-anchor="middle" font-size="11" fill="#16a34a">✓ actually answers</text>
</svg>
