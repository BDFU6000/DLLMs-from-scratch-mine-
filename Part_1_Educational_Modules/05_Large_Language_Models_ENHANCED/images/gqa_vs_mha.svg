<svg viewBox="0 0 840 340" xmlns="http://www.w3.org/2000/svg" font-family="ui-sans-serif, system-ui, sans-serif">
  <rect width="840" height="340" fill="#f8fafc"/>
  <text x="420" y="32" text-anchor="middle" font-size="20" font-weight="800" fill="#0f172a">GQA: sharing Keys/Values to speed up generation</text>
  <text x="210" y="68" text-anchor="middle" font-size="14" font-weight="700" fill="#2563eb">Multi-Head Attention (GPT)</text>
  <g font-size="11" text-anchor="middle">
    <g fill="#dbeafe" stroke="#2563eb"><rect x="60" y="90" width="60" height="34" rx="6"/><rect x="140" y="90" width="60" height="34" rx="6"/><rect x="220" y="90" width="60" height="34" rx="6"/><rect x="300" y="90" width="60" height="34" rx="6"/></g>
    <text x="90" y="112" fill="#1e3a8a">Q1</text><text x="170" y="112" fill="#1e3a8a">Q2</text><text x="250" y="112" fill="#1e3a8a">Q3</text><text x="330" y="112" fill="#1e3a8a">Q4</text>
    <g fill="#fde68a" stroke="#ca8a04"><rect x="60" y="160" width="60" height="34" rx="6"/><rect x="140" y="160" width="60" height="34" rx="6"/><rect x="220" y="160" width="60" height="34" rx="6"/><rect x="300" y="160" width="60" height="34" rx="6"/></g>
    <text x="90" y="182" fill="#92400e">KV1</text><text x="170" y="182" fill="#92400e">KV2</text><text x="250" y="182" fill="#92400e">KV3</text><text x="330" y="182" fill="#92400e">KV4</text>
  </g>
  <g stroke="#94a3b8"><line x1="90" y1="124" x2="90" y2="160"/><line x1="170" y1="124" x2="170" y2="160"/><line x1="250" y1="124" x2="250" y2="160"/><line x1="330" y1="124" x2="330" y2="160"/></g>
  <text x="210" y="225" text-anchor="middle" font-size="11" fill="#dc2626">4 Q heads → 4 KV heads (lots of memory)</text>

  <text x="630" y="68" text-anchor="middle" font-size="14" font-weight="700" fill="#16a34a">Grouped-Query Attention (LLaMA 2/3)</text>
  <g font-size="11" text-anchor="middle">
    <g fill="#dbeafe" stroke="#2563eb"><rect x="480" y="90" width="60" height="34" rx="6"/><rect x="560" y="90" width="60" height="34" rx="6"/><rect x="640" y="90" width="60" height="34" rx="6"/><rect x="720" y="90" width="60" height="34" rx="6"/></g>
    <text x="510" y="112" fill="#1e3a8a">Q1</text><text x="590" y="112" fill="#1e3a8a">Q2</text><text x="670" y="112" fill="#1e3a8a">Q3</text><text x="750" y="112" fill="#1e3a8a">Q4</text>
    <g fill="#fde68a" stroke="#ca8a04"><rect x="520" y="160" width="80" height="34" rx="6"/><rect x="660" y="160" width="80" height="34" rx="6"/></g>
    <text x="560" y="182" fill="#92400e">KV (shared)</text><text x="700" y="182" fill="#92400e">KV (shared)</text>
  </g>
  <g stroke="#94a3b8"><line x1="510" y1="124" x2="555" y2="160"/><line x1="590" y1="124" x2="565" y2="160"/><line x1="670" y1="124" x2="695" y2="160"/><line x1="750" y1="124" x2="705" y2="160"/></g>
  <text x="630" y="225" text-anchor="middle" font-size="11" fill="#16a34a">4 Q heads → 2 KV heads (half the memory)</text>
  <rect x="160" y="265" width="520" height="55" rx="10" fill="#fff" stroke="#bbf7d0"/>
  <text x="420" y="290" text-anchor="middle" font-size="12" font-weight="700" fill="#166534">Smaller KV cache → much faster, cheaper inference</text>
  <text x="420" y="310" text-anchor="middle" font-size="11" fill="#475569">Why nearly all modern open-source LLMs use GQA</text>
</svg>
