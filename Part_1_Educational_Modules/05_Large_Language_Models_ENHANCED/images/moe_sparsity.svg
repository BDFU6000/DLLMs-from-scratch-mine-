<svg viewBox="0 0 840 360" xmlns="http://www.w3.org/2000/svg" font-family="ui-sans-serif, system-ui, sans-serif">
  <rect width="840" height="360" fill="#f8fafc"/>
  <text x="420" y="32" text-anchor="middle" font-size="20" font-weight="800" fill="#0f172a">Mixture of Experts: only wake up a few experts per token</text>
  <rect x="60" y="70" width="120" height="50" rx="10" fill="#1e293b"/><text x="120" y="100" text-anchor="middle" font-size="13" font-weight="700" fill="#fff">Token</text>
  <rect x="230" y="70" width="140" height="50" rx="10" fill="#fef9c3" stroke="#ca8a04"/><text x="300" y="95" text-anchor="middle" font-size="12" font-weight="700" fill="#92400e">Router</text><text x="300" y="111" text-anchor="middle" font-size="9" fill="#92400e">picks Top-2 experts</text>
  <line x1="180" y1="95" x2="228" y2="95" stroke="#64748b" stroke-width="2"/>
  <g font-size="11" text-anchor="middle">
    <rect x="430" y="50"  width="120" height="38" rx="8" fill="#dcfce7" stroke="#16a34a" stroke-width="2"/><text x="490" y="74" fill="#166534" font-weight="700">Expert 1 ✓</text>
    <rect x="430" y="96"  width="120" height="38" rx="8" fill="#e2e8f0" opacity="0.5"/><text x="490" y="120" fill="#94a3b8">Expert 2 (off)</text>
    <rect x="430" y="142" width="120" height="38" rx="8" fill="#dcfce7" stroke="#16a34a" stroke-width="2"/><text x="490" y="166" fill="#166534" font-weight="700">Expert 3 ✓</text>
    <rect x="430" y="188" width="120" height="38" rx="8" fill="#e2e8f0" opacity="0.5"/><text x="490" y="212" fill="#94a3b8">Expert 4 (off)</text>
    <text x="490" y="245" fill="#94a3b8" font-size="14">⋮ (8 total)</text>
  </g>
  <g stroke="#16a34a" stroke-width="2"><line x1="370" y1="90" x2="428" y2="69"/><line x1="370" y1="100" x2="428" y2="161"/></g>
  <g stroke="#cbd5e1" stroke-dasharray="3 3"><line x1="370" y1="95" x2="428" y2="115"/><line x1="370" y1="100" x2="428" y2="207"/></g>
  <rect x="610" y="96" width="120" height="46" rx="10" fill="#ede9fe" stroke="#7c3aed"/><text x="670" y="124" text-anchor="middle" font-size="12" font-weight="700" fill="#5b21b6">Weighted sum</text>
  <line x1="550" y1="69" x2="608" y2="112" stroke="#16a34a" stroke-width="2"/><line x1="550" y1="161" x2="608" y2="125" stroke="#16a34a" stroke-width="2"/>
  <rect x="180" y="285" width="480" height="58" rx="10" fill="#fff" stroke="#c4b5fd"/>
  <text x="420" y="310" text-anchor="middle" font-size="12" font-weight="700" fill="#5b21b6">Mixtral 8×7B: 47B total params, but only ~14B active per token</text>
  <text x="420" y="330" text-anchor="middle" font-size="11" fill="#475569">Knowledge of a giant model, speed of a small one. (Used by Mixtral, Grok, likely GPT-4.)</text>
</svg>
