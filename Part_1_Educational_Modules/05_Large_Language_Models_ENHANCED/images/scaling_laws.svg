<svg viewBox="0 0 840 340" xmlns="http://www.w3.org/2000/svg" font-family="ui-sans-serif, system-ui, sans-serif">
  <rect width="840" height="340" fill="#f8fafc"/>
  <text x="420" y="34" text-anchor="middle" font-size="20" font-weight="800" fill="#0f172a">Scaling Laws: 3 levers that make LLMs smarter</text>
  <rect x="50" y="70" width="220" height="110" rx="12" fill="#dbeafe" stroke="#2563eb"/>
  <text x="160" y="105" text-anchor="middle" font-size="15" font-weight="700" fill="#1e3a8a">Compute (C)</text>
  <text x="160" y="130" text-anchor="middle" font-size="11" fill="#1e3a8a">processing power (FLOPs)</text>
  <text x="160" y="150" text-anchor="middle" font-size="11" fill="#1e3a8a">thousands of GPUs, months</text>
  <rect x="310" y="70" width="220" height="110" rx="12" fill="#dcfce7" stroke="#16a34a"/>
  <text x="420" y="105" text-anchor="middle" font-size="15" font-weight="700" fill="#166534">Data (D)</text>
  <text x="420" y="130" text-anchor="middle" font-size="11" fill="#166534">number of training tokens</text>
  <text x="420" y="150" text-anchor="middle" font-size="11" fill="#166534">trillions of tokens</text>
  <rect x="570" y="70" width="220" height="110" rx="12" fill="#ede9fe" stroke="#7c3aed"/>
  <text x="680" y="105" text-anchor="middle" font-size="15" font-weight="700" fill="#5b21b6">Model Size (N)</text>
  <text x="680" y="130" text-anchor="middle" font-size="11" fill="#5b21b6">number of parameters</text>
  <text x="680" y="150" text-anchor="middle" font-size="11" fill="#5b21b6">billions of weights</text>
  <rect x="120" y="210" width="600" height="100" rx="12" fill="#fff" stroke="#fcd34d"/>
  <text x="420" y="238" text-anchor="middle" font-size="13" font-weight="700" fill="#b45309">⚖ Chinchilla rule: balance them</text>
  <text x="420" y="262" text-anchor="middle" font-size="11.5" fill="#475569">A huge model on tiny data fails; a tiny model on huge data plateaus.</text>
  <text x="420" y="284" text-anchor="middle" font-size="11.5" fill="#475569">Data should scale with model size — roughly a 10B-param model wants ~200B tokens.</text>
</svg>
